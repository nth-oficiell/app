<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail • Email Jetable Instantané</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .email-display {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .email-input {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: monospace;
            min-width: 250px;
        }
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn-success {
            background: #48bb78;
            color: white;
        }
        .email-item {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .email-item:hover {
            border-left: 4px solid #667eea;
            transform: translateX(5px);
        }
        .email-item.unread {
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            animation: slideIn 0.3s;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✉️ TempMail Express</h1>
            <p>Email jetable instantané - 100% gratuit</p>
            <a href="https://discord.gg/silentcorp" target="_blank" style="display: inline-block; margin-top: 15px; padding: 8px 20px; background: #5865F2; color: white; text-decoration: none; border-radius: 50px; font-weight: 600;">
                <i class="fab fa-discord"></i> Support Discord
            </a>
        </div>

        <div class="card">
            <h2>📫 Votre adresse temporaire</h2>
            <div class="email-display">
                <input type="text" id="emailAddress" class="email-input" readonly placeholder="Cliquez sur 'Nouvelle adresse'">
                <button class="btn btn-success" onclick="copyEmail()">
                    <i class="fas fa-copy"></i> Copier
                </button>
                <button class="btn btn-primary" onclick="generateNewEmail()" id="generateBtn">
                    <i class="fas fa-sync-alt"></i> Nouvelle adresse
                </button>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-primary" onclick="refreshInbox()" id="refreshBtn">
                    <i class="fas fa-redo-alt"></i> Actualiser
                </button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>📥 Boîte de réception</h2>
                <span id="messageCount" style="background: #667eea; color: white; padding: 4px 12px; border-radius: 50px;">0</span>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Chargement des messages...</p>
            </div>

            <div id="emptyState" style="text-align: center; padding: 40px; color: #718096; display: block;">
                <i class="fas fa-envelope-open" style="font-size: 48px; margin-bottom: 15px; opacity: 0.5;"></i>
                <p>Aucun message pour le moment</p>
            </div>

            <div id="emailsList" class="emails-list" style="display: none;"></div>
        </div>
    </div>

    <div id="toast" class="toast" style="display: none;"></div>

    <script>
        const API_BASE_URL = window.location.origin + '/api';
        let currentEmail = null;
        let currentToken = null;
        let currentPassword = null;
        let messages = [];

        async function generateNewEmail() {
            showLoading(true);
            disableButtons(true);
            
            try {
                // 1. Récupérer les domaines disponibles
                const domainsRes = await fetch(API_BASE_URL + '/domains');
                const domains = await domainsRes.json();
                
                if (!domains || domains.length === 0) {
                    throw new Error('Aucun domaine disponible');
                }

                // 2. Générer un email aléatoire
                const username = Math.random().toString(36).slice(2, 12);
                const email = `${username}@${domains[0]}`;
                const password = Math.random().toString(36).slice(2, 15);

                // 3. Créer le compte
                const createRes = await fetch(API_BASE_URL + '/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        address: email,
                        password: password
                    })
                });

                if (!createRes.ok) {
                    throw new Error('Erreur création compte');
                }

                // 4. Obtenir le token
                const tokenRes = await fetch(API_BASE_URL + '/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        address: email,
                        password: password
                    })
                });

                const tokenData = await tokenRes.json();
                
                currentEmail = email;
                currentPassword = password;
                currentToken = tokenData.token;

                document.getElementById('emailAddress').value = email;
                showToast('✅ Email généré avec succès !');
                
                // 5. Récupérer les messages
                await refreshInbox();

            } catch (error) {
                showToast('❌ Erreur: ' + error.message, true);
                console.error(error);
            } finally {
                showLoading(false);
                disableButtons(false);
            }
        }

        async function refreshInbox() {
            if (!currentEmail || !currentToken) {
                showToast('ℹ️ Générez d\'abord une adresse email', true);
                return;
            }

            try {
                const response = await fetch(API_BASE_URL + '/messages', {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (response.status === 401) {
                    showToast('Session expirée, générez une nouvelle adresse', true);
                    return;
                }

                const data = await response.json();
                messages = data['hydra:member'] || data || [];
                displayMessages(messages);

            } catch (error) {
                console.error('Erreur refresh:', error);
            }
        }

        function displayMessages(msgs) {
            const emailsList = document.getElementById('emailsList');
            const emptyState = document.getElementById('emptyState');
            const messageCount = document.getElementById('messageCount');

            if (!msgs || msgs.length === 0) {
                emailsList.style.display = 'none';
                emptyState.style.display = 'block';
                messageCount.textContent = '0';
                return;
            }

            emptyState.style.display = 'none';
            emailsList.style.display = 'block';
            messageCount.textContent = msgs.length;

            let html = '';
            msgs.forEach(msg => {
                const date = new Date(msg.createdAt);
                html += `
                    <div class="email-item" onclick="viewMessage('${msg.id}')">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <strong>${escapeHtml(msg.from.name || msg.from.address)}</strong>
                            <span style="color: #718096; font-size: 0.9em;">${formatDate(date)}</span>
                        </div>
                        <div style="font-weight: 600; margin-bottom: 5px;">${escapeHtml(msg.subject || '(Pas de sujet)')}</div>
                        <div style="color: #718096; font-size: 0.95em;">${escapeHtml(msg.intro || 'Cliquez pour lire')}</div>
                    </div>
                `;
            });

            emailsList.innerHTML = html;
        }

        async function viewMessage(messageId) {
            try {
                const response = await fetch(API_BASE_URL + `/message/${messageId}`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const message = await response.json();
                
                alert(`
De: ${message.from.name || message.from.address}
Sujet: ${message.subject || '(Pas de sujet)'}
Date: ${new Date(message.createdAt).toLocaleString()}

${message.text || 'Contenu HTML disponible'}
                `);

            } catch (error) {
                showToast('❌ Erreur chargement message', true);
            }
        }

        async function copyEmail() {
            const email = document.getElementById('emailAddress').value;
            if (!email || email.includes('Cliquez')) {
                showToast('ℹ️ Générez d\'abord une adresse email', true);
                return;
            }
            
            try {
                await navigator.clipboard.writeText(email);
                showToast('📋 Email copié !');
            } catch (err) {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = email;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('📋 Email copié !');
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isError ? '#ef4444' : '#48bb78';
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function disableButtons(disable) {
            document.getElementById('generateBtn').disabled = disable;
            document.getElementById('refreshBtn').disabled = disable;
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatDate(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return 'à l\'instant';
            if (diff < 3600) return `il y a ${Math.floor(diff / 60)} min`;
            if (diff < 86400) return `il y a ${Math.floor(diff / 3600)} h`;
            return date.toLocaleDateString();
        }
    </script>
</body>
</html>
